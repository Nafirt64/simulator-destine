<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Destine Broker — Simulator comisioane</title>
  <style>
    :root{
      --blue:#123C8C;
      --navy:#0B3D91;
      --orange:#F47A1F;
      --bg:#F4F6FA;
      --card:#FFFFFF;
      --text:#111827;
      --muted:#6B7280;
      --border:#D7DEE8;
      --alt:#EEF2F7;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
    header{background:var(--blue);color:#fff}
    .wrap{max-width:1200px;margin:0 auto;padding:16px}
    .head{display:flex;gap:14px;align-items:center}
    .logo{height:54px;width:auto;display:block}
    .titles h1{font-size:22px;line-height:1.1;margin:0;font-weight:800}
    .titles p{margin:4px 0 0 0;color:#EAF0FF;font-size:12px}
    main{padding:18px 16px}
    .grid{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr;gap:14px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 6px 20px rgba(17,24,39,.06)}
    .card .pad{padding:14px}
    .row{display:flex;flex-wrap:wrap;gap:10px;align-items:end}
    label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
    input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:12px;font-size:14px;outline:none}
    input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(244,122,31,.18)}
    .col{flex:1;min-width:160px}
    .col.sm{min-width:140px}
    .btns{display:flex;gap:10px;flex-wrap:wrap}
    button{border:0;border-radius:12px;padding:10px 14px;font-weight:700;cursor:pointer}
    .primary{background:var(--orange);color:#fff}
    .ghost{background:#fff;color:var(--blue);border:1px solid var(--border)}
    .summary{display:flex;flex-wrap:wrap;gap:10px;justify-content:space-between;align-items:center}
    .summary .pill{background:rgba(18,60,140,.08);color:var(--blue);border:1px solid rgba(18,60,140,.18);padding:8px 10px;border-radius:999px;font-weight:700;font-size:12px}
    table{width:100%;border-collapse:separate;border-spacing:0;overflow:hidden;border-radius:16px;border:1px solid var(--border)}
    thead th{background:var(--blue);color:#fff;font-size:12px;padding:12px 10px;text-align:center;position:sticky;top:0}
    tbody td{padding:10px 10px;border-top:1px solid var(--border);text-align:center;font-size:13px}
    tbody tr:nth-child(even) td{background:var(--alt)}
    tbody td.left{text-align:left}
    tbody td.key{font-weight:800;color:var(--navy)}
    tbody td.key.black{color:var(--text)}
    tbody td.key.blue{color:var(--blue)}
    .hint{font-size:12px;color:var(--muted);margin-top:8px}
    .sectionTitle{font-weight:800;margin:0 0 10px 0}
    .subgrid{display:grid;grid-template-columns:1fr;gap:10px}
  
    @media (max-width: 640px){
      .wrap{padding:12px}
      .head{gap:10px}
      .logo{height:44px}
      .titles h1{font-size:18px}
      .titles p{font-size:11px}
      main{padding:14px 12px}
      .card{border-radius:14px}
      .card .pad{padding:12px}
      .summary{gap:8px}
      .summary .pill{width:100%;text-align:center}
      .btns{width:100%}
      .btns button{flex:1;min-width:140px}
      input{font-size:16px;padding:12px 12px} /* 16px prevents iOS zoom */
      .col{min-width:100%}
      .col.sm{min-width:100%}
      thead th{font-size:11px;padding:10px 8px}
      tbody td{font-size:12px;padding:10px 8px}
    }

    @media (max-width: 640px){
      .hide-details .col-com{display:none}
      .hide-details thead th.col-com{display:none}
    }

    .toggleRow{
      display:flex;align-items:center;gap:10px;flex-wrap:wrap;
      margin-top:10px;
    }
    .toggleRow label{margin:0;color:var(--muted);font-size:12px}
    .toggleRow input{width:auto}

</style>
</head>

    <div class="titles">
      <h1>Destine Broker</h1>
      <p>Simulator comisioane</p>
    </div>
  </div>
</header>

<main>
  <div class="grid">

    <div class="card">
      <div class="pad summary">
        <div class="pill" id="sumPrime">Total prime: 0,00 RON</div>
        <div class="pill" id="sumPuncte">Puncte: 0</div>
        <div class="btns">
          <button class="primary" id="btnCalc">Calculează</button>
          <button class="ghost" id="btnCSV">Export CSV</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="pad">
        <h3 class="sectionTitle">Setări punct + intrări</h3>

        <div class="row">
          <div class="col sm">
            <label>Valoare punct NV (RON)</label>
            <input id="vpNV" inputmode="decimal" value="350" />
          </div>
          <div class="col sm">
            <label>Valoare punct VIAȚĂ (RON)</label>
            <input id="vpV" inputmode="decimal" value="40" />
          </div>
        </div>

        <div style="height:10px"></div>

        <div class="subgrid">
          <div class="card" style="box-shadow:none">
            <div class="pad">
              <h3 class="sectionTitle" style="font-size:14px;margin-bottom:8px">Procente (% Destine)</h3>
              <div class="row">
                <div class="col sm"><label>RCA</label><input id="cRCA" inputmode="decimal" value="10"></div>
                <div class="col sm"><label>ACCIDENTE</label><input id="cACC" inputmode="decimal" value="65"></div>
                <div class="col sm"><label>ASIST.RUTIERA</label><input id="cASR" inputmode="decimal" value="50"></div>
                <div class="col sm"><label>VIAȚĂ</label><input id="cVIA" inputmode="decimal" value="90"></div>
                <div class="col sm"><label>ALTELE</label><input id="cALT" inputmode="decimal" value="30"></div>
              </div>
            </div>
          </div>

          <div class="card" style="box-shadow:none">
            <div class="pad">
              <h3 class="sectionTitle" style="font-size:14px;margin-bottom:8px;color:var(--blue)">Prime (RON)</h3>
              <div class="row">
                <div class="col sm"><label>RCA</label><input class="prime" id="pRCA" inputmode="decimal" value="1000"></div>
                <div class="col sm"><label>ACCIDENTE</label><input class="prime" id="pACC" inputmode="decimal" value="0"></div>
                <div class="col sm"><label>ASIST.RUTIERA</label><input class="prime" id="pASR" inputmode="decimal" value="0"></div>
                <div class="col sm"><label>VIAȚĂ</label><input class="prime" id="pVIA" inputmode="decimal" value="0"></div>
                <div class="col sm"><label>ALTELE</label><input class="prime" id="pALT" inputmode="decimal" value="0"></div>
              </div>
</div>
          </div>
        </div>

      </div>
    </div>

    <div class="card">
      <div class="pad">
        <h3 class="sectionTitle">Rezultate</h3>
        <div class="toggleRow">
          <input type="checkbox" id="toggleDetails" />
          <label for="toggleDetails">Afișează detalii comisioane</label>
        </div>
        <div style="overflow:auto;max-height:60vh">
          <table id="tbl">
            <thead>
              <tr>
                <th style="min-width:240px;text-align:left">TREAPTĂ CARIERĂ</th>
                <th style="min-width:130px">TOTAL VENIT</th>
                <th style="min-width:110px">PUNCTE</th>
                <th class="col-com" style="min-width:120px">COM. RCA</th>
                <th class="col-com" style="min-width:120px">COM. ACC.</th>
                <th class="col-com" style="min-width:140px">COM. ASIST.RUTIERA</th>
                <th class="col-com" style="min-width:120px">COM. VIAȚĂ</th>
                <th class="col-com" style="min-width:120px">COM. ALTELE</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
</div>
    </div>

  </div>
</main>

<script>
  const grila = [
    ["ASPIRANT", 0.4668, 10.7],
    ["BROKER DEBUTANT", 0.5170, 20.1],
    ["BROKER", 0.5657, 29.2],
    ["BROKER COORDONATOR", 0.6368, 42.5],
    ["BROKER SENIOR", 0.6727, 49.2],
    ["BROKER PRINCIPAL", 0.7010, 54.5],
    ["BROKER ZONAL 1", 0.7257, 59.1],
    ["BROKER ZONAL 2", 0.7476, 63.2],
    ["BROKER REGIONAL 1", 0.7668, 66.8],
    ["BROKER REGIONAL 2", 0.7839, 70.0],
    ["BROKER GENERAL", 0.8000, 73.0]
  ];

  const $ = (id) => document.getElementById(id);

  function parseRO(s) {
    s = (s ?? "").toString().trim();
    if (!s) return 0;
    s = s.replace(/\s|\u00A0/g, "");

    if (s.includes(".") && s.includes(",")) return Number(s.replaceAll(".", "").replace(",", "."));
    if (s.includes(",")) return Number(s.replaceAll(".", "").replace(",", "."));
    if (s.includes(".")) {
      const parts = s.split(".");
      const allDigits = parts.every(p => /^\d+$/.test(p));
      if (allDigits && parts.length > 1 && parts[parts.length-1].length === 3) return Number(parts.join(""));
      return Number(s);
    }
    return Number(s);
  }

  function formatRO2(n) {
    return (Number(n) || 0).toLocaleString("ro-RO", {minimumFractionDigits:2, maximumFractionDigits:2});
  }

  function formatRODyn(n, maxDec=4) {
    n = Number(n) || 0;
    let s = n.toLocaleString("ro-RO", {minimumFractionDigits:maxDec, maximumFractionDigits:maxDec});
    if (s.includes(",")) s = s.replace(/0+$/,"").replace(/,$/,"");
    return s;
  }

  function formatPrimeInputs() {
    document.querySelectorAll("input.prime").forEach(inp => {
      if (inp.value.trim() === "") return;
      const v = parseRO(inp.value);
      inp.value = formatRO2(v);
    });
  }

  document.querySelectorAll("input.prime").forEach(inp => {
    inp.addEventListener("blur", formatPrimeInputs);
    inp.addEventListener("keydown", (e) => { if (e.key === "Enter") formatPrimeInputs(); });
  });

  function compute() {
    formatPrimeInputs();

    const vpNV = parseRO($("vpNV").value);
    const vpV  = parseRO($("vpV").value);

    const pr = {
      rca: parseRO($("pRCA").value),
      acc: parseRO($("pACC").value),
      asr: parseRO($("pASR").value),
      via: parseRO($("pVIA").value),
      alt: parseRO($("pALT").value)
    };

    const cf = {
      rca: parseRO($("cRCA").value),
      acc: parseRO($("cACC").value),
      asr: parseRO($("cASR").value),
      via: parseRO($("cVIA").value),
      alt: parseRO($("cALT").value)
    };

    const puncteNV = vpNV > 0 ? (pr.rca + pr.acc + pr.asr + pr.alt) / vpNV : 0;
    const puncteV  = vpV  > 0 ? pr.via / vpV : 0;
    const puncteTot = puncteNV + puncteV;

    const totalPrime = pr.rca + pr.acc + pr.asr + pr.via + pr.alt;

    $("sumPrime").textContent = "Total prime: " + formatRO2(totalPrime) + " RON";
    $("sumPuncte").textContent = "Puncte: " + formatRODyn(puncteTot, 4);

    const rows = grila.map(([nivel, L, K]) => {
      const v_rca = (pr.rca * cf.rca * L) / 100.0;
      const k = K / 100.0;
      const v_acc = pr.acc * (cf.acc / 100.0) * k;
      const v_asr = pr.asr * (cf.asr / 100.0) * k;
      const v_via = pr.via * (cf.via / 100.0) * k;
      const v_alt = pr.alt * (cf.alt / 100.0) * k;
      const total = v_rca + v_acc + v_asr + v_via + v_alt;
      return {nivel, total, puncte: puncteTot, rca:v_rca, acc:v_acc, asr:v_asr, via:v_via, alt:v_alt};
    });

    const tbody = $("tbody");
    tbody.innerHTML = "";
    rows.forEach(r => {
      const tr = document.createElement("tr");
      tr.innerHTML =
        "<td class='left key black'>" + r.nivel + "</td>" +
        "<td class='key blue'>" + formatRO2(r.total) + "</td>" +
        "<td class='key blue'>" + formatRODyn(r.puncte, 4) + "</td>" +
        "<td class='col-com'>" + formatRO2(r.rca) + "</td>" +
        "<td class='col-com'>" + formatRO2(r.acc) + "</td>" +
        "<td class='col-com'>" + formatRO2(r.asr) + "</td>" +
        "<td class='col-com'>" + formatRO2(r.via) + "</td>" +
        "<td class='col-com'>" + formatRO2(r.alt) + "</td>";
      tbody.appendChild(tr);
    });

    return rows;
  }

  function exportCSV(rows) {
    const header = ["TREAPTĂ CARIERĂ","TOTAL VENIT","PUNCTE","COM. RCA","COM. ACC.","COM. ASIST.RUTIERA","COM. VIAȚĂ","COM. ALTELE"];
    const lines = [header.join(";")];

    rows.forEach(r => {
      const vals = [
        r.nivel,
        formatRO2(r.total),
        formatRODyn(r.puncte, 4),
        formatRO2(r.rca),
        formatRO2(r.acc),
        formatRO2(r.asr),
        formatRO2(r.via),
        formatRO2(r.alt)
      ];
      const line = vals.map(v => '"' + String(v).replaceAll('"','""') + '"').join(";");
      lines.push(line);
    });

    const csv = lines.join("\r\n");
    const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const dt = new Date();
    const stamp = dt.toISOString().slice(0,19).replaceAll(":","-");
    a.href = url;
    a.download = "Simulator_Destine_" + stamp + ".csv";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  $("btnCalc").addEventListener("click", () => {
    try { compute(); } catch (e) { alert("Date invalide. Folosește numere (acceptă și virgulă): 1234,56"); console.error(e); }
  });

  $("btnCSV").addEventListener("click", () => {
    try { const rows = compute(); exportCSV(rows); } catch (e) { alert("Nu pot exporta: date invalide."); console.error(e); }
  });


  // Mobile: ascunde detaliile comisioanelor implicit
  function applyDetailsMode() {
    const isMobile = window.matchMedia("(max-width: 640px)").matches;
    const cb = $("toggleDetails");
    document.body.classList.toggle("hide-details", isMobile && !cb.checked);
  }

  $("toggleDetails").addEventListener("change", applyDetailsMode);
  window.addEventListener("resize", applyDetailsMode);
  applyDetailsMode();


  compute();
</script>
</body>
</html>
